<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IMDb Analytics Dashboard – Top 1000 Movies</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    /* ─── RESET & VARIABLES ─────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold:        #f5c518;
      --gold-dim:    #c9a012;
      --gold-glow:   rgba(245, 197, 24, 0.18);
      --bg-deep:     #07070d;
      --bg-dark:     #0d0d17;
      --bg-card:     #111120;
      --bg-card2:    #15151f;
      --text-bright: #f0ede8;
      --text-muted:  #7a7890;
      --text-dim:    #3e3d52;
      --border:      rgba(245, 197, 24, 0.12);
      --radius:      14px;
      --font-display: 'Bebas Neue', sans-serif;
      --font-body:    'Cormorant Garamond', serif;
      --font-mono:    'DM Mono', monospace;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg-deep);
      color: var(--text-bright);
      font-family: var(--font-body);
      font-size: 18px;
      overflow-x: hidden;
      cursor: none;
    }

    /* ─── CURSOR FIX ────────────────────────────────────── */
    *,
    a, a:hover, a:visited, a:active, a:focus,
    button, button:hover, button:active, button:focus,
    input, textarea, select, label,
    [role="button"], [tabindex] {
      cursor: none !important;
    }

    /* ─── CUSTOM CURSOR ─────────────────────────────────── */
    #cursor-dot {
      position: fixed; top: 0; left: 0; z-index: 9999;
      width: 8px; height: 8px;
      background: var(--gold);
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      transition: transform 0.05s;
    }
    #cursor-ring {
      position: fixed; top: 0; left: 0; z-index: 9998;
      width: 34px; height: 34px;
      border: 1.5px solid rgba(245,197,24,0.5);
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      transition: transform 0.15s ease, width 0.2s, height 0.2s, border-color 0.2s;
    }
    body:has(a:hover) #cursor-ring,
    body:has(button:hover) #cursor-ring {
      width: 52px; height: 52px;
      border-color: var(--gold);
    }

    /* ─── GRAIN OVERLAY ─────────────────────────────────── */
    #grain {
      position: fixed; inset: 0; z-index: 1000;
      pointer-events: none;
      opacity: 0.038;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px;
      animation: grain-shift 0.5s steps(2) infinite;
    }
    @keyframes grain-shift {
      0%   { transform: translate(0, 0); }
      25%  { transform: translate(-3px, 2px); }
      50%  { transform: translate(2px, -3px); }
      75%  { transform: translate(-1px, 4px); }
      100% { transform: translate(3px, -1px); }
    }

    /* ─── SCROLLBAR ─────────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg-deep); }
    ::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 2px; }

    /* ─── LOADER ────────────────────────────────────────── */
    #loader {
      position: fixed; inset: 0; z-index: 8000;
      background: var(--bg-deep);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column;
      transition: opacity 0.9s cubic-bezier(0.4,0,0.2,1),
                  visibility 0.9s cubic-bezier(0.4,0,0.2,1);
    }
    #loader.loader-hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .loader-inner { text-align: center; }
    .loader-film {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      margin-bottom: 32px;
    }
    .loader-reel {
      width: 14px; height: 44px;
      background: var(--text-dim);
      border-radius: 3px;
      animation: reel-flicker 0.9s ease-in-out infinite;
    }
    .loader-reel:nth-child(1) { animation-delay: 0s; }
    .loader-reel:nth-child(2) { height: 28px; animation-delay: 0.15s; }
    .loader-reel:nth-child(3) { height: 36px; animation-delay: 0.3s; }
    .loader-reel:nth-child(4) { height: 22px; animation-delay: 0.45s; }
    .loader-reel:nth-child(5) { height: 40px; animation-delay: 0.6s; }
    .loader-reel:nth-child(6) { height: 30px; animation-delay: 0.75s; }
    .loader-reel:nth-child(7) { height: 44px; animation-delay: 0.9s; }
    @keyframes reel-flicker {
      0%, 100% { background: var(--text-dim); transform: scaleY(1); }
      50%       { background: var(--gold);     transform: scaleY(0.6); }
    }
    .loader-title-wrap { margin-bottom: 6px; }
    .loader-title {
      font-family: var(--font-display);
      font-size: clamp(2.8rem, 8vw, 5rem);
      color: var(--text-bright);
      letter-spacing: 0.1em;
      line-height: 0.95;
    }
    .loader-title .lt-gold { color: var(--gold); }
    .loader-sub {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 44px;
    }
    .loader-bar-track {
      width: 220px; height: 1px;
      background: var(--text-dim);
      margin: 0 auto 14px;
      position: relative; overflow: hidden;
    }
    .loader-bar-fill {
      position: absolute; top: 0; left: 0;
      height: 100%; background: var(--gold);
      width: 0;
      animation: bar-grow 2.3s cubic-bezier(0.4,0,0.2,1) forwards;
      box-shadow: 0 0 8px var(--gold);
    }
    @keyframes bar-grow { to { width: 100%; } }
    .loader-caption {
      font-family: var(--font-mono);
      font-size: 0.58rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-dim);
      opacity: 0;
      animation: fade-up 0.6s 0.4s forwards;
    }
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<!-- ─── LOADER ────────────────────────────────────────── -->
<div id="loader">
  <div class="loader-inner">
    <div class="loader-film">
      <div class="loader-reel"></div>
      <div class="loader-reel"></div>
      <div class="loader-reel"></div>
      <div class="loader-reel"></div>
      <div class="loader-reel"></div>
      <div class="loader-reel"></div>
      <div class="loader-reel"></div>
    </div>
    <div class="loader-title-wrap">
      <div class="loader-title"><span class="lt-gold">IMDb</span> Analytics</div>
    </div>
    <div class="loader-sub">Top 1000 Movies · Data Visualization</div>
    <div class="loader-bar-track">
      <div class="loader-bar-fill"></div>
    </div>
    <div class="loader-caption">Preparing cinematic experience…</div>
  </div>
</div>

<!-- Custom Cursor -->
<div id="cursor-dot"></div>
<div id="cursor-ring"></div>

<!-- Film Grain Overlay -->
<div id="grain"></div>

</body>
</html>
