<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IMDb Analytics Dashboard – Top 1000 Movies</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    /* ─── RESET & VARIABLES ─────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold:        #f5c518;
      --gold-dim:    #c9a012;
      --gold-glow:   rgba(245, 197, 24, 0.18);
      --bg-deep:     #07070d;
      --bg-dark:     #0d0d17;
      --bg-card:     #111120;
      --bg-card2:    #15151f;
      --text-bright: #f0ede8;
      --text-muted:  #7a7890;
      --text-dim:    #3e3d52;
      --border:      rgba(245, 197, 24, 0.12);
      --radius:      14px;
      --font-display: 'Bebas Neue', sans-serif;
      --font-body:    'Cormorant Garamond', serif;
      --font-mono:    'DM Mono', monospace;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg-deep);
      color: var(--text-bright);
      font-family: var(--font-body);
      font-size: 18px;
      overflow-x: hidden;
    }

    /* ─── SCROLLBAR ─────────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg-deep); }
    ::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 2px; }
  </style>
</head>
<body>

</body>
</html>
